<script type="text/babel">

  const productos = [
    { p: "/IMG/Menu/IMG CARD 1.0.jpg", a: "/IMG/Menu/IMG CARD 1.5.jpg", b: "/IMG/Menu/IMG CARD 1.1.jpg" },
    { p: "/IMG/Menu/IMG CARD 2.0.jpg", a: "/IMG/Menu/IMG CARD 2.1.jpg", b: "/IMG/Menu/IMG CARD 1.05.jpg" },
    { p: "/IMG/Menu/IMD CARD 3.0.jpg", a: "/IMG/Menu/IMD CARD 3.05.jpg", b: "/IMG/Menu/IMD CARD 3.1.jpg" },

  ]


  function Grid() { 
    return (
      <div className="cards">

        {productos.map((x, i) => (

          <div key={i} className="card1">

            <div>
              <img src={x.p} height="306px" width="320px" />
            </div>                        

            <div className="CardInterna">
              <img src={x.a} height="150px" width="200px" />
              <img src={x.b} height="150px" width="200px" />
            </div>

            
          </div>
        ))}


      </div>
    )
  }

  ReactDOM.createRoot(document.getElementById("cards-root")).render(<Grid />)

</script>
